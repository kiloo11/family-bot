services:
  family-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/family.db

  family-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: family-web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/family.db
    ports:
      - "${WEB_PORT:-8000}:8000"
